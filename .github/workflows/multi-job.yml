name: multi-job
on:
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: print bulding the app
        run: echo "building the app"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: print testing
        run: echo "testing the app"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: print deploy
        run: echo "deployinng the app"
