name: self-hosted-demo
on:
  workflow_dispatch:
jobs:
  self-demo:
    runs-on: self-hosted
    steps:
      - name: print the hostname
        run: hostname
      - name: print working directory
        run: pwd
      - name: create file
        run: echo "demo file" > demo.txt
      - name: verify file exist
        run: |
          if [ -f demo.txt ]
          then
               echo "file exist"
          else
               echo "file does not exist"
          fi

