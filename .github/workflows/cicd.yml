name: cicd-pipeline
on:
 workflow_dispatch:
   inputs:
     environment:
       type: choice
       description: option to choose enviorment while running workflow
       required: true
       default: test
       options:
         - dev
         - test
         - prod
   
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: pull code
        run: echo "pull code from github"
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build code
        run: echo "building code"
    needs: code 
 
  test:
    runs-on: ubuntu-latest
    steps:
      - name: test-code
        run: echo "test-code"
    needs: [build,code]
  deploy:
    if: inputs.environment == 'prod'
    runs-on: ubuntu-latest
    steps:
      - name: deploy-code
        run: echo "deploy-code"
    needs: [code,build,test]
