name: matrix-demo
on:
  workflow_dispatch:
jobs:
  python-setup:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest","windows-latest"]
        python-version: ["3.10","3.11","3.12"]
        exclude:
          - os: windows-latest
            python-version: "3.10"
    steps:
      - name: setup python
        uses: actions/setup-python@v5 
        with:
          python-version: ${{ matrix.python-version }}
      - name: verify version
        run: exit 1

